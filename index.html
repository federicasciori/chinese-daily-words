<\!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinese Daily Words 中文每日词汇</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="header-top">
            <h1 class="title">🐉 中文每日词汇 🐉</h1>
            <p class="subtitle">Daily Chinese Words | Learn 5 Words Today</p>
        </div>
        <div class="decorative-line"></div>
    </header>
    <main class="container">
        <section class="today-section">
            <h2 class="section-title">📅 Today's Words</h2>
            <div class="words-grid" id="todayWords"></div>
        </section>
        <section class="archive-section">
            <h2 class="section-title">📚 Word Archive</h2>
            <div id="archiveContainer"></div>
            <p id="emptyArchive" class="empty-message">No archived words yet. Come back tomorrow\!</p>
        </section>
    </main>
    <footer class="footer">
        <p>Keep learning\! 学习加油！</p>
        <p class="footer-date" id="currentDate"></p>
    </footer>
    <script src="script.js"></script>
</body>
</html>
